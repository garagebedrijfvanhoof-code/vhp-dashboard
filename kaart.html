<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossiers Kaart — VHP Autoparts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --border:#2e2e2e; --border2:#3a3a3a;
    --text:#e8e8e2; --text2:#888; --text3:#555;
    --accent:#c8f04a; --danger:#f05a42;
    --purple:#c084fc; --teal:#2dd4bf; --red:#f87171; --lime:#a3e635; --orange:#fb923c;
    --font:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: var(--font); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: .6rem 1rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
  .topbar h1 { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: .05em; white-space: nowrap; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .pill { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--mono); padding: 3px 10px; border-radius: 20px; border: 1.5px solid transparent; cursor: pointer; user-select: none; transition: all .15s; white-space: nowrap; }
  .pill.active { opacity: 1; }
  .pill.inactive { opacity: .28; }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pill.vhp        { border-color:var(--accent);  color:var(--accent); }
  .pill.allparts   { border-color:var(--purple);  color:var(--purple); }
  .pill.precisium  { border-color:var(--teal);    color:var(--teal); }
  .pill.partspoint { border-color:var(--red);     color:var(--red); }
  .pill.vrooam     { border-color:var(--lime);    color:var(--lime); }
  .pill.carx       { border-color:var(--orange);  color:var(--orange); }
  .pill.kilinclar  { border-color:#22d3ee;         color:#22d3ee; }
  .pill.autodist   { border-color:#fb7185;         color:#fb7185; }
  .radius-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; font-size: 11px; font-family: var(--mono); color: var(--text2); white-space: nowrap; flex-wrap: wrap; }
  .radius-wrap input[type=range] { width: 90px; accent-color: var(--accent); }
  .radius-val { min-width: 36px; color: var(--accent); font-family: var(--mono); font-size: 11px; }
  .btn-sm { font-size: 11px; font-family: var(--mono); color: var(--text3); cursor: pointer; padding: 2px 8px; border: 1px solid var(--border2); border-radius: 4px; background: transparent; }
  .btn-sm:hover { color: var(--danger); border-color: var(--danger); }
  .btn-sm.unk-btn { color: #8fd4f8; border-color: #8fd4f844; }
  .btn-sm.unk-btn:hover { border-color: #8fd4f8; }
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; }
  .side { width: 0; background: var(--surface); border-left: 1px solid var(--border); overflow: hidden; transition: width .25s; display: flex; flex-direction: column; flex-shrink: 0; }
  .side.open { width: 280px; }
  .side-header { padding: .75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .side-header h2 { font-family: var(--mono); font-size: 12px; color: var(--orange); }
  .side-close { font-size: 18px; color: var(--text3); cursor: pointer; }
  .side-close:hover { color: var(--danger); }
  .side-body { flex: 1; overflow-y: auto; padding: .5rem; }
  .unk-group { margin-bottom: 1rem; }
  .unk-group-title { font-size: 10px; font-family: var(--mono); padding: 3px 8px; border-radius: 3px; margin-bottom: 6px; display: inline-block; }
  .unk-item { font-size: 12px; color: var(--text2); padding: 5px 8px; border-bottom: 1px solid var(--border); line-height: 1.4; }
  .unk-item:last-child { border-bottom: none; }
  .unk-item span { font-size: 10px; font-family: var(--mono); color: var(--text3); display: block; margin-top: 2px; }
  .leaflet-popup-content-wrapper { background:#1a1a1a; border:1px solid #3a3a3a; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,.6); }
  .leaflet-popup-tip { background:#1a1a1a; }
  .leaflet-popup-content { margin:10px 14px; font-family:'IBM Plex Sans',sans-serif; }
  .pop-name { font-size:13px; font-weight:500; color:#e8e8e2; margin-bottom:4px; }
  .pop-adres { font-size:11px; color:#888; font-family:'IBM Plex Mono',monospace; margin-bottom:5px; line-height:1.4; }
  .pop-badge { font-size:10px; font-family:'IBM Plex Mono',monospace; padding:2px 7px; border-radius:3px; display:inline-block; margin-bottom:6px; }
  .pop-note { font-size:11px; color:#666; font-family:'IBM Plex Mono',monospace; margin-bottom:6px; }
  .pop-btn { font-size:11px; font-family:'IBM Plex Mono',monospace; background:#2a2a2a; border:1px solid #3a3a3a; color:#c8f04a; border-radius:4px; padding:3px 9px; cursor:pointer; display:block; width:100%; text-align:center; }
  .pop-btn:hover { background:#333; }
  .map-hint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); background:rgba(26,26,26,.9); border:1px solid var(--border2); border-radius:8px; padding:7px 14px; font-size:11px; font-family:var(--mono); color:var(--text2); z-index:1000; pointer-events:none; display:none; white-space:nowrap; }
  .map-hint b { color:var(--accent); }
  .count-badge { font-size:10px; font-family:var(--mono); background:#2a2a2a; border:1px solid var(--border2); border-radius:10px; padding:1px 7px; color:var(--text2); margin-left:4px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>// GROSSIERS KAART NL</h1>
  <div class="filters">
    <div class="pill vhp active"        data-f="vhp"        onclick="toggleF(this)"><div class="pill-dot" style="background:var(--accent)"></div>VHP (jij)</div>
    <div class="pill allparts active"   data-f="allparts"   onclick="toggleF(this)"><div class="pill-dot" style="background:var(--purple)"></div>AllParts</div>
    <div class="pill precisium active"  data-f="precisium"  onclick="toggleF(this)"><div class="pill-dot" style="background:var(--teal)"></div>Precisium</div>
    <div class="pill partspoint active" data-f="partspoint" onclick="toggleF(this)"><div class="pill-dot" style="background:var(--red)"></div>PartsPoint</div>
    <div class="pill vrooam active"     data-f="vrooam"     onclick="toggleF(this)"><div class="pill-dot" style="background:var(--lime)"></div>Vrooam</div>
    <div class="pill carx active"       data-f="carx"       onclick="toggleF(this)"><div class="pill-dot" style="background:var(--orange)"></div>CarX</div>
    <div class="pill kilinclar active"  data-f="kilinclar"  onclick="toggleF(this)"><div class="pill-dot" style="background:#22d3ee"></div>Kilinclar</div>
    <div class="pill autodist active"   data-f="autodist"   onclick="toggleF(this)"><div class="pill-dot" style="background:#fb7185"></div>Autodistribution</div>
  </div>
  <div class="radius-wrap">
    straal:
    <input type="range" id="r-slider" min="0" max="50" value="0" step="1" oninput="onRadiusSlide(this.value)"/>
    <span class="radius-val" id="r-val">uit</span>
    <button class="btn-sm" onclick="clearCircle()">✕ cirkel</button>
    <button class="btn-sm unk-btn" onclick="toggleSide()">? onbekend <span class="count-badge" id="unk-count">0</span></button>
  </div>
</div>
<div class="main">
  <div id="map"></div>
  <div class="side" id="side">
    <div class="side-header">
      <h2>Adres onbekend — nog in te vullen</h2>
      <span class="side-close" onclick="toggleSide()">×</span>
    </div>
    <div class="side-body" id="side-body"></div>
  </div>
</div>
<div class="map-hint" id="map-hint">Straal actief — klik op een <b>marker</b> of ergens op de kaart</div>

function makeIcon(color, big) {
  const s = big?18:11, b = big?3:2;
  return L.divIcon({
    className:'',
    html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${color};border:${b}px solid rgba(255,255,255,.75);box-shadow:0 0 6px ${color}88;"></div>`,
    iconSize:[s,s], iconAnchor:[s/2,s/2], popupAnchor:[0,-(s/2+4)]
  });
}

let activeF = new Set(Object.keys(cfg));
let markers = [];
let circleLayer=null, circleCenter=null, radiusKm=0;

known.forEach(g => {
  const c = cfg[g.f];
  const isVHP = g.f==='vhp';
  const m = L.marker([g.lat,g.lng], {icon:makeIcon(c.color,isVHP)});
  const bs = `background:${c.color}22;color:${c.color};border:1px solid ${c.color}55;`;
  m.bindPopup(`
    <div class="pop-name">${g.name}</div>
    <div class="pop-adres">${g.adres}</div>
    <span class="pop-badge" style="${bs}">${c.label}</span>
    ${g.note?`<div class="pop-note">${g.note}</div>`:''}
    ${!isVHP?`<button class="pop-btn" onclick="setCenter(${g.lat},${g.lng})">↔ toon straal rondom dit punt</button>`:''}
  `, {maxWidth:260});
  m.addTo(map);
  markers.push({m, f:g.f, lat:g.lat, lng:g.lng, color:c.color, isVHP});
});

function toggleF(pill) {
  const f = pill.dataset.f;
  if(activeF.has(f)){activeF.delete(f);pill.classList.replace('active','inactive');}
  else{activeF.add(f);pill.classList.replace('inactive','active');}
  markers.forEach(({m,f:mf})=>activeF.has(mf)?m.addTo(map):map.removeLayer(m));
  if(circleCenter&&radiusKm>0) highlightInRadius();
}

function onRadiusSlide(v) {
  radiusKm=+v;
  document.getElementById('r-val').textContent=radiusKm===0?'uit':radiusKm+' km';
  if(radiusKm===0){clearCircle();return;}
  document.getElementById('map-hint').style.display=circleCenter?'none':'block';
  if(circleCenter) drawCircle();
}

function setCenter(lat,lng){
  map.closePopup();
  circleCenter={lat,lng};
  document.getElementById('map-hint').style.display='none';
  if(radiusKm>0) drawCircle();
  else document.getElementById('map-hint').style.display='block';
}

function drawCircle(){
  if(circleLayer) map.removeLayer(circleLayer);
  circleLayer=L.circle([circleCenter.lat,circleCenter.lng],{
    radius:radiusKm*1000, color:'#c8f04a', weight:2, opacity:.8,
    fillColor:'#c8f04a', fillOpacity:.05
  }).addTo(map);
  highlightInRadius();
}

function highlightInRadius(){
  markers.forEach(({m,lat,lng,color,isVHP,f})=>{
    if(!activeF.has(f)) return;
    const dist=map.distance([circleCenter.lat,circleCenter.lng],[lat,lng]);
    const inR=dist<=radiusKm*1000;
    m.setIcon(makeIcon(color,inR||isVHP));
    m.setZIndexOffset(inR?1000:0);
  });
}

function clearCircle(){
  if(circleLayer){map.removeLayer(circleLayer);circleLayer=null;}
  circleCenter=null;
  document.getElementById('r-slider').value=0;
  document.getElementById('r-val').textContent='uit';
  document.getElementById('map-hint').style.display='none';
  radiusKm=0;
  markers.forEach(({m,color,isVHP})=>{m.setIcon(makeIcon(color,isVHP));m.setZIndexOffset(0);});
}

map.on('click',e=>{
  if(radiusKm>0){circleCenter={lat:e.latlng.lat,lng:e.latlng.lng};drawCircle();document.getElementById('map-hint').style.display='none';}
});

// Zijpaneel onbekenden
document.getElementById('unk-count').textContent=unknown.length;
const byF={};
unknown.forEach(u=>{(byF[u.formule]=byF[u.formule]||[]).push(u.name);});
const body=document.getElementById('side-body');
Object.entries(byF).forEach(([f,names])=>{
  const c=cfg[f]||{color:'#888',label:f};
  const grp=document.createElement('div');
  grp.className='unk-group';
  grp.innerHTML=`<div class="unk-group-title" style="background:${c.color}22;color:${c.color};border:1px solid ${c.color}44">${c.label} — adres onbekend</div>`;
  names.forEach(n=>{
    const item=document.createElement('div');
    item.className='unk-item';
    item.innerHTML=`${n}<span>adres nog op te zoeken</span>`;
    grp.appendChild(item);
  });
  body.appendChild(grp);
});

function toggleSide(){document.getElementById('side').classList.toggle('open');}
</script>
</body>
